# ============================================================
# AEGIS — Global Settings
# ============================================================

server:
  host: "127.0.0.1"
  port: 8400
  workers: 1
  reload: false  # keep the runtime stable; opt into dev reload manually

safety:
  safe_mode: true
  dry_run_default: true
  require_approval_high_risk: true
  max_actions_per_command: 10
  max_plan_depth: 5
  cooldown_seconds: 1.0

logging:
  level: "DEBUG"
  format: "jsonl"
  directory: "./logs"
  max_file_size_mb: 50
  retention_days: 30

memory:
  stm_max_turns: 20
  episodic_retention_days: 90
  governance_status: "not_implemented"
  semantic_auto_index: false
  procedural_enabled: false
  memory_write_authorized: false
  memory_retrieval_authorized: false
  vector_store_enabled: false
  rag_enabled: false

models:
  backend: "offline_disabled"
  base_url: ""
  timeout: 120.0
  default_model: "not_configured"
  chat_model: "not_configured"
  code_model: "not_configured"
  embed_model: "not_configured"
  provider_status: "not_configured"
  provider_health_verified: false
  model_calls_authorized: false
  embedding_generation_authorized: false
  auto_mode_enabled: false

features:
  cloud_fallback: false
  multimodal: false
  vision_feed: false
  speech_io: false
  agent_loop: false
  deterministic_decomposition: true
  replay_enabled: true
