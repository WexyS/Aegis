# ============================================================
# AEGIS — Future-Gated Model Registry Metadata
# ============================================================
# This file is not consumed as runtime provider selection.
# A configured provider URL or model name is not endpoint health, model
# availability, Auto Mode permission, evidence, verifier success, or execution
# authority. Future Model Auto Mode / Provider Health Check work must validate
# these entries before any model call.
# VRAM budget note: metadata only, not live resource verification.

defaults:
  backend: "lm-studio"
  base_url: "http://localhost:1234/v1"
  timeout_seconds: 120
  max_retries: 2

routes:
  general:
    description: "General conversation, intent classification, routing"
    primary: "qwen/qwen3.6-27b"
    fallback: "qwen2.5:14b"
    max_tokens: 4096
    temperature: 0.3
    vram_estimate_gb: 5.0

  code:
    description: "Code generation, analysis, refactoring"
    primary: "qwen/qwen2.5-coder-14b"
    fallback: "qwen2.5-coder:7b"
    max_tokens: 8192
    temperature: 0.1
    vram_estimate_gb: 9.0

  code_heavy:
    description: "Complex code tasks — large context, multi-file"
    primary: "qwen3-coder:30b"
    fallback: "qwen2.5-coder:14b"
    max_tokens: 16384
    temperature: 0.1
    vram_estimate_gb: 12.0
    requires_approval: true  # user must opt-in

  embedding:
    description: "Text embedding for RAG and semantic memory"
    primary: "text-embedding-nomic-embed-text-v1.5"
    fallback: null
    vram_estimate_gb: 0.3

  # Cloud routes — disabled by default
  cloud_general:
    description: "Cloud fallback for general tasks"
    enabled: false
    backend: "openai"
    model: "gpt-4o-mini"
    requires_approval: true

health_check:
  interval_seconds: 60
  timeout_seconds: 10
  unhealthy_threshold: 3
